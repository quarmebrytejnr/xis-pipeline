name: XIS Pipeline Sync

on:
  # Daily sync at 06:00 UTC — adjust to your timezone
  schedule:
    - cron: '0 6 * * *'

  # Manual trigger with optional date range override for P&L
  workflow_dispatch:
    inputs:
      targets:
        description: 'Comma-separated targets (leave blank for all). e.g. products,sales_orders,pnl'
        required: false
        type: string
      pnl_from_date:
        description: 'P&L from date YYYY-MM-DD (Xero only, optional)'
        required: false
        type: string
      pnl_to_date:
        description: 'P&L to date YYYY-MM-DD (Xero only, optional)'
        required: false
        type: string

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install xis-pipeline
        run: |
          python -m pip install --upgrade pip
          # Install from PyPI once published:
          # pip install xis-pipeline
          #
          # Until then, install from this repo directly:
          pip install -e .

      # ---------- Inflow sync ----------
      - name: Sync Inflow → Supabase
        env:
          INFLOW_API_KEY:    ${{ secrets.INFLOW_API_KEY }}
          INFLOW_COMPANY_ID: ${{ secrets.INFLOW_COMPANY_ID }}
          SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:      ${{ secrets.SUPABASE_KEY }}
        run: |
          python - <<'EOF'
          import os
          from xis import InflowSync

          raw = os.environ.get("INPUT_TARGETS", "")
          all_inflow = {"products", "location_inventory", "purchase_orders", "sales_orders", "customers", "locations"}
          if raw:
              targets = [t.strip() for t in raw.split(",") if t.strip() in all_inflow]
          else:
              targets = None  # sync all

          InflowSync().sync(targets=targets)
          EOF
        env:
          INPUT_TARGETS: ${{ inputs.targets }}

      # ---------- Xero sync ----------
      - name: Sync Xero → Supabase
        env:
          XERO_CLIENT_ID:     ${{ secrets.XERO_CLIENT_ID }}
          XERO_CLIENT_SECRET: ${{ secrets.XERO_CLIENT_SECRET }}
          XERO_REFRESH_TOKEN: ${{ secrets.XERO_REFRESH_TOKEN }}
          XERO_TENANT_ID:     ${{ secrets.XERO_TENANT_ID }}
          SUPABASE_URL:       ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:       ${{ secrets.SUPABASE_KEY }}
          GH_PAT:             ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY:  ${{ github.repository }}
        run: |
          python - <<'EOF'
          import os
          from xis import XeroSync

          raw = os.environ.get("INPUT_TARGETS", "")
          all_xero = {"accounts", "contacts", "pnl"}
          if raw:
              targets = [t.strip() for t in raw.split(",") if t.strip() in all_xero]
          else:
              targets = None

          from_date = os.environ.get("INPUT_PNL_FROM") or None
          to_date   = os.environ.get("INPUT_PNL_TO")   or None

          sync = XeroSync()
          if from_date and to_date and (not targets or "pnl" in (targets or [])):
              results = sync.sync(targets=["accounts", "contacts"] if targets else [])
              results["pnl"] = sync.sync_pnl(from_date=from_date, to_date=to_date)
          else:
              results = sync.sync(targets=targets)
          EOF
        env:
          INPUT_TARGETS:  ${{ inputs.targets }}
          INPUT_PNL_FROM: ${{ inputs.pnl_from_date }}
          INPUT_PNL_TO:   ${{ inputs.pnl_to_date }}

      # ---------- Upload logs on failure ----------
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sync-failure-logs
          path: '*.log'
          retention-days: 7
